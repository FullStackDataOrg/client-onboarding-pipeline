version: 2

models:
  - name: dim_campaign
    description: "One row per (platform, campaign_id). Surrogate key decouples business key from warehouse identity."
    columns:
      - name: campaign_key
        tests: [unique, not_null]
      - name: campaign_id
        tests: [not_null]
      - name: platform
        tests: [not_null]

  - name: dim_date
    description: "Calendar dimension covering 2024-01-01 through 2026-12-31."
    columns:
      - name: date_key
        tests: [unique, not_null]

  - name: fct_daily_spend
    description: "Lowest grain: one row per (platform, campaign, day). FK to dim_campaign and dim_date."
    columns:
      - name: spend_key
        tests: [unique, not_null]
      - name: campaign_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_campaign')
              field: campaign_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: spend_usd
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: agg_channel_performance
    description: "Denormalised BI mart: daily spend by channel with CTR and CPC pre-computed."
    columns:
      - name: date_day
        tests: [not_null]
      - name: platform
        tests: [not_null]
      - name: total_spend_usd
        tests: [not_null]
